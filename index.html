<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blindshop | MNRV</title>
  <meta name="description" content="Jouw online winkel voor jaloezieen en raamdecoratie – blindshop.mnrv.nl" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .logo span {
      color: #c8a96e;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(200, 169, 110, 0.2);
      border-top-color: #c8a96e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #site-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="logo">blind<span>shop</span></div>
    <div class="spinner"></div>
  </div>

  <iframe
    id="site-frame"
    src="https://luxblinds-jaloezie-n-webshop-1015695120297.us-west1.run.app"
    title="Blindshop"
    loading="eager"
    allowfullscreen
  ></iframe>

  <script>
    const frame = document.getElementById('site-frame');
    const loader = document.getElementById('loader');

    frame.addEventListener('load', () => {
      loader.classList.add('hidden');
      setTimeout(() => loader.remove(), 500);
    });

    // Fallback: hide loader after 8 seconds regardless
    setTimeout(() => loader.classList.add('hidden'), 8000);
  </script>

</body>
</html>
